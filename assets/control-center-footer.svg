<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="160" viewBox="0 0 1180 160" role="img" aria-labelledby="title desc">
  <title id="title">Layellie Control Center footer</title>
  <desc id="desc">End of transmission. All systems operational.</desc>
  <style>
    .panel{fill:#07121B;stroke:#1A3547}.grid-line{stroke:#244354}.primary{fill:#F2FAFF}.muted{fill:#8EA7B5}.status{fill:#2DD4BF}
    @media (prefers-color-scheme:light){.panel{fill:#F7FBFD;stroke:#BED3DF}.grid-line{stroke:#C5D7E0}.primary{fill:#10202C}.muted{fill:#526777}.status{fill:#0D9488}}
  </style>
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38BDF8"/>
      <stop offset=".5" stop-color="#2DD4BF"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path class="grid-line" d="M28 0H0V28" fill="none" stroke-width="1" opacity=".16"/>
    </pattern>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="1" y="1" width="1178" height="158" rx="24" class="panel"/>
  <rect x="1" y="1" width="1178" height="158" rx="24" fill="url(#grid)" opacity=".55"/>
  <path d="M72 80H360M820 80H1108" stroke="url(#accent)" stroke-width="2" stroke-dasharray="12 9" opacity=".7">
    <animate attributeName="stroke-dashoffset" values="0;-84" dur="3.5s" repeatCount="indefinite"/>
  </path>
  <circle r="5" fill="#38BDF8" filter="url(#glow)">
    <animateMotion path="M72 80H360" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle r="5" fill="#F59E0B" filter="url(#glow)">
    <animateMotion path="M1108 80H820" dur="3s" repeatCount="indefinite"/>
  </circle>
  <text x="590" y="52" text-anchor="middle" class="muted" font-family="Consolas,monospace" font-size="11" letter-spacing="3">LAYELLIE CONTROL CENTER</text>
  <text x="590" y="86" text-anchor="middle" class="primary" font-family="Consolas,monospace" font-size="24" font-weight="700" letter-spacing="1.8">END OF TRANSMISSION</text>
  <circle cx="427" cy="116" r="5" class="status" filter="url(#glow)">
    <animate attributeName="opacity" values="1;.25;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="590" y="121" text-anchor="middle" class="status" font-family="Consolas,monospace" font-size="12" letter-spacing="1.7">ALL SYSTEMS OPERATIONAL</text>
  <text x="590" y="143" text-anchor="middle" class="muted" font-family="Consolas,monospace" font-size="10" letter-spacing="1.4">SESSION REMAINS OPEN // SIGNAL STANDBY</text>
</svg>
