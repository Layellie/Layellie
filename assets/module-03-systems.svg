<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="92" viewBox="0 0 1180 92" role="img" aria-labelledby="title desc">
  <title id="title">DEPLOYED SYSTEMS</title>
  <desc id="desc">Layellie Control Center module 03: selected builds / release channels</desc>
  <style>
    .panel{fill:#07121B;stroke:#1A3547}.grid-line{stroke:#244354}.primary{fill:#F2FAFF}.muted{fill:#8EA7B5}.status{fill:#2DD4BF}
    @media (prefers-color-scheme:light){.panel{fill:#F7FBFD;stroke:#BED3DF}.grid-line{stroke:#C5D7E0}.primary{fill:#10202C}.muted{fill:#526777}.status{fill:#0D9488}}
  </style>
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38BDF8"/>
      <stop offset=".58" stop-color="#2DD4BF"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path class="grid-line" d="M24 0H0V24" fill="none" stroke-width="1" opacity=".18"/>
    </pattern>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="1" y="1" width="1178" height="90" rx="17" class="panel"/>
  <rect x="1" y="1" width="1178" height="90" rx="17" fill="url(#grid)" opacity=".55"/>
  <rect x="20" y="18" width="5" height="56" rx="2.5" fill="url(#accent)" filter="url(#glow)"/>
  <text x="48" y="31" class="muted" font-family="Consolas,monospace" font-size="11" letter-spacing="2.2">MODULE 03 // SELECTED BUILDS / RELEASE CHANNELS</text>
  <text x="48" y="65" class="primary" font-family="Consolas,monospace" font-size="25" font-weight="700" letter-spacing="1.5">DEPLOYED SYSTEMS</text>
  <text x="1106" y="33" text-anchor="end" class="muted" font-family="Consolas,monospace" font-size="10" letter-spacing="2">STATUS</text>
  <text x="1106" y="62" text-anchor="end" class="status" font-family="Consolas,monospace" font-size="12" font-weight="700">OPERATIONAL</text>
  <circle cx="1133" cy="57" r="5" class="status" filter="url(#glow)">
    <animate attributeName="opacity" values="1;.25;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <path d="M48 81H1134" fill="none" stroke="url(#accent)" stroke-width="1.5" stroke-dasharray="18 10" opacity=".55">
    <animate attributeName="stroke-dashoffset" values="0;-112" dur="4s" repeatCount="indefinite"/>
  </path>
</svg>
